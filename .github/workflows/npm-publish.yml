name: Publish npm packages

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: ubuntu
            directory: .
          - name: windows
            directory: packages/windows
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          cd "${{ matrix.package.directory }}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="${{ github.event.release.tag_name }}"

          if [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ] && [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Verify ${{ matrix.package.name }} npm package contents
        run: |
          set -euo pipefail
          cd "${{ matrix.package.directory }}"
          npm pack --dry-run

      - name: Publish ${{ matrix.package.name }} to npm
        run: |
          set -euo pipefail
          cd "${{ matrix.package.directory }}"
          npm publish --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}